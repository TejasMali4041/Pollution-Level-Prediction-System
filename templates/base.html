<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Air Pollution Prediction{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="navbar">
        <div class="logo">🌍 Air Pollution Prediction System</div>
        <div class="subtitle">Machine Learning Based AQI Dashboard</div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <h3>Navigation</h3>
            <ul>
                <li>Dashboard</li>
                <li>AQI Scale</li>
            </ul>

            <h3>AQI Categories</h3>
            <ul class="aqi-scale">
                <li class="good">0–50 : Good</li>
                <li class="satisfactory">51–100 : Satisfactory</li>
                <li class="moderate">101–200 : Moderate</li>
                <li class="poor">201–300 : Poor</li>
                <li class="verypoor">301–400 : Very Poor</li>
                <li class="severe">401–500 : Severe</li>
            </ul>
        </div>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>
    </div>

</body>
</html>
