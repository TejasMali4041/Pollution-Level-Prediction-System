{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="card">
    <h2>Enter Pollution Parameters</h2>

    <form action="/predict" method="post">

        <div class="grid">
            <input type="number" step="any" name="pm25" placeholder="PM2.5" required>
            <input type="number" step="any" name="pm10" placeholder="PM10" required>
            <input type="number" step="any" name="no2" placeholder="NO2" required>
            <input type="number" step="any" name="so2" placeholder="SO2" required>
            <input type="number" step="any" name="co" placeholder="CO" required>
            <input type="number" step="any" name="temp" placeholder="Temperature" required>
            <input type="number" step="any" name="humidity" placeholder="Humidity" required>
        </div>

        <button type="submit">Predict AQI</button>
    </form>
</div>

{% if prediction is defined %}
<div class="result-card" style="border-left: 6px solid {{ color }};">
    <h2>Predicted AQI</h2>
    <h1 style="color: {{ color }}">{{ prediction }}</h1>
    <h3>{{ category }}</h3>
</div>

<div class="gauge">
    <div class="gauge-fill" style="width: {{ prediction/5 }}%;"></div>
</div>

<canvas id="aqiChart" height="100"></canvas>

<script>
const ctx = document.getElementById('aqiChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Day1','Day2','Day3','Day4','Today'],
        datasets: [{
            label: 'AQI Trend',
            data: [120,150,180,200, {{ prediction }}],
            borderColor: '#2c3e50',
            tension: 0.4,
            fill: false
        }]
    }
});
</script>
{% endif %}

{% endblock %}
